type: object
properties:
  accounts:
    type: array
    items:
      allOf:
        - $ref: '../../openapi.yml#/components/schemas/account-response'
        - type: object
          properties:
            icon:
              type: string
              description: The icon of the account, in a base64 encoded string
  categories:
    type: array
    items: { $ref: '../../openapi.yml#/components/schemas/category-response' }
  budget:
    type: array
    items:
      type: object
      required: [income, period, expenses]
      properties:
        income: { type: number, format: double }
        period: { $ref: '../../openapi.yml#/components/schemas/date-range' }
        expenses:
          type: array
          items:
            type: object
            required: [id, name, expected]
            properties:
              id: { type: integer, format: int64 }
              name: { type: string }
              expected: { type: number }
  contract:
    type: array
    items:
      allOf:
        - $ref: '../../openapi.yml#/components/schemas/contract-response'
        - type: object
          properties:
            contract:
              type: string
              description: The HEX encoded attached contract file
  tags:
    type: array
    items:
      type: string
  schedules:
    type: array
    items:
      allOf:
        - $ref: '../../openapi.yml#/components/schemas/transaction-schedule-response'
        - type: object
          properties:
            lastRun: { type: string, format: date }
            nextRun: { type: string, format: date }
  transaction:
    type: array
    items: { $ref: '../../openapi.yml#/components/schemas/transaction-response' }
  ruleGroups:
    type: array
    items:
      allOf:
        - $ref: '../../openapi.yml#/components/schemas/rule-group-response'
        - type: object
          properties:
            rules:
              type: array
              items: { $ref: '../../openapi.yml#/components/schemas/rule-response' }
